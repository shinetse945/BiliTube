name: Build & Release Extension

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bilitube/package-lock.json

      - name: Install dependencies
        working-directory: bilitube
        run: npm ci

      - name: Build extension
        working-directory: bilitube
        run: npm run prod

      - name: Package extension into zip
        run: |
          zip -r bilitube-build.zip extensions/

      - name: Upload zip to release
        # 只有当触发类型为 release 时才运行
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: bilitube-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        # 仅当手动触发时运行
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: bilitube-manual-build
          path: bilitube-*.zip
