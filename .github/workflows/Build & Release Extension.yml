name: Build & Release Extension

on:
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bilitube/package-lock.json

      - name: Install dependencies
        working-directory: bilitube
        run: npm ci

      - name: Build extension
        working-directory: bilitube
        run: npm run prod

      # 从 manifest.json 读取项目名与版本号，组成 <name>-<version>
      - name: Read name & version from manifest
        id: meta
        run: |
          NAME=$(jq -r '.name' extension/manifest.json)
          VERSION=$(jq -r '.version' extension/manifest.json)
          echo "package=${NAME}-${VERSION}" >> "$GITHUB_OUTPUT"

      # 进入 extension/ 内压缩，避免多一层目录
      - name: Package extension into zip
        run: |
          cd extension
          zip -r "../${{ steps.meta.outputs.package }}.zip" .

      # release 触发时上传 zip 作为 release 资产
      - name: Upload zip to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.package }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 手动触发时直接上传 extension 目录内容，避免双重压缩
      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package }}
          path: extension/
